<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crew-flags</title>
    <style>
      html,
      body {
        --popup-width: 560px;
        --popup-height: 520px;
        margin: 0;
        width: var(--popup-width);
        height: var(--popup-height);
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      main {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        padding: 12px;
        overflow-y: auto;
      }

      h1 {
        margin: 0;
        font-size: 15px;
      }

      .popup-header {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
      }

      .settings-toggle-button {
        margin-left: auto;
        width: 28px;
        height: 28px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        color: #374151;
        padding: 4px;
      }

      .settings-toggle-button:hover {
        background: #f3f4f6;
      }

      .settings-toggle-button:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 1px;
      }

      .settings-panel {
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 10px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .settings-label {
        font-size: 11px;
        color: #4b5563;
      }

      .settings-input {
        box-sizing: border-box;
        width: 100%;
        font-size: 12px;
        padding: 4px 6px;
      }

      .settings-save-button {
        height: 26px;
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 600;
      }

      .settings-save-button:hover {
        background: #eef2ff;
        border-color: #c7d2fe;
      }

      #title {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      #fields > li {
        margin: 0 0 8px;
      }

      .label {
        font-size: 11px;
        color: #555;
      }

      .value {
        font-size: 13px;
        font-weight: 600;
        word-break: break-word;
      }

      .domain-title {
        margin: 0;
      }

      .domain-card {
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        border-radius: 8px;
        padding: 6px;
      }

      .domain-header-row {
        display: flex;
        align-items: center;
      }

      .track-row {
        display: flex;
        gap: 6px;
        margin: 6px 0;
      }

      .track-input {
        flex: 1;
        box-sizing: border-box;
        font-size: 12px;
        padding: 4px 6px;
      }

      .track-button {
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.9;
      }

      .track-button:hover {
        background: #d1fae5;
        opacity: 1;
      }

      .track-button:focus-visible {
        outline: 2px solid #10b981;
        outline-offset: 1px;
      }

      .track-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .remove-button {
        margin-left: 6px;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.85;
      }

      .remove-domain-button {
        margin-left: 0;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.85;
      }

      .remove-button:hover,
      .remove-domain-button:hover {
        background: #fee2e2;
        opacity: 1;
      }

      .remove-button:focus-visible,
      .remove-domain-button:focus-visible {
        outline: 2px solid #ef4444;
        outline-offset: 1px;
      }

      .remove-button img,
      .remove-domain-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .context-badge {
        font-size: 10px;
        font-weight: 700;
        color: #1d4ed8;
        background: #dbeafe;
        border: 1px solid #93c5fd;
        border-radius: 999px;
        padding: 2px 6px;
        margin-left: 8px;
      }

      .refresh-domain-button {
        margin-left: auto;
        margin-right: 6px;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.9;
      }

      .refresh-domain-button:hover {
        background: #ccfbf1;
        opacity: 1;
      }

      .refresh-domain-button:focus-visible {
        outline: 2px solid #14b8a6;
        outline-offset: 1px;
      }

      .refresh-domain-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .refresh-domain-button.is-loading img {
        animation: refresh-spin 0.9s linear infinite;
      }

      @keyframes refresh-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .flag-card {
        margin-top: 4px;
        position: relative;
      }

      .flag-card + .flag-card {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #e5e7eb;
      }

      .flag-title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        row-gap: 4px;
      }

      .flag-title {
        margin-right: 0;
      }

      .flag-actions {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .flag-fields-list {
        margin-top: 4px;
        margin-bottom: 4px;
      }

      .flag-last-fetched {
        position: absolute;
        right: 0;
        bottom: 0;
        font-size: 11px;
        color: #6b7280;
        text-align: right;
        min-height: 0;
      }

      .flag-last-fetched-stale {
        color: #b45309;
        font-weight: 600;
      }

      .field-row {
        display: grid;
        grid-template-columns: minmax(92px, max-content) 1fr;
        column-gap: 8px;
        align-items: start;
        margin-bottom: 2px;
      }

      .value-badge {
        display: inline-block;
        width: fit-content;
        max-width: 100%;
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        padding: 1px 8px;
        line-height: 1.4;
        white-space: normal;
      }

      .value-badge-true {
        color: #166534;
        background: #dcfce7;
        border-color: #86efac;
      }

      .value-badge-false {
        color: #991b1b;
        background: #fee2e2;
        border-color: #fca5a5;
      }

      .value-badge-other {
        color: #854d0e;
        background: #fef9c3;
        border-color: #fde68a;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="popup-header">
        <h1>Flag info</h1>
        <button id="settings-toggle" class="settings-toggle-button" type="button" aria-label="Settings">
          &#9881;
        </button>
      </div>
      <section id="settings-panel" class="settings-panel" hidden>
        <div class="settings-grid">
          <label class="settings-field">
            <span class="settings-label">Width</span>
            <input id="popup-width-input" class="settings-input" type="number" min="320" max="800" step="1" />
          </label>
          <label class="settings-field">
            <span class="settings-label">Height</span>
            <input id="popup-height-input" class="settings-input" type="number" min="320" max="600" step="1" />
          </label>
          <button id="save-settings-button" class="settings-save-button" type="button">Save</button>
        </div>
      </section>
      <ul id="fields"></ul>
      <div id="error"></div>
    </main>
    <script type="module" src="popup/index.js"></script>
  </body>
</html>
