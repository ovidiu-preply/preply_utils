<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crew-flags</title>
    <style>
      html,
      body {
        margin: 0;
        width: 560px;
        height: 520px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      main {
        box-sizing: border-box;
        padding: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      #title {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      #fields > li {
        margin: 0 0 8px;
      }

      .label {
        font-size: 11px;
        color: #555;
      }

      .value {
        font-size: 13px;
        font-weight: 600;
        word-break: break-word;
      }

      .domain-title {
        margin: 0;
      }

      .domain-card {
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        border-radius: 8px;
        padding: 6px;
      }

      .domain-header-row {
        display: flex;
        align-items: center;
      }

      .track-row {
        display: flex;
        gap: 6px;
        margin: 6px 0;
      }

      .track-input {
        flex: 1;
        box-sizing: border-box;
        font-size: 12px;
        padding: 4px 6px;
      }

      .track-button {
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.9;
      }

      .track-button:hover {
        background: #d1fae5;
        opacity: 1;
      }

      .track-button:focus-visible {
        outline: 2px solid #10b981;
        outline-offset: 1px;
      }

      .track-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .remove-button {
        margin-left: 6px;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.85;
      }

      .remove-domain-button {
        margin-left: 0;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.85;
      }

      .remove-button:hover,
      .remove-domain-button:hover {
        background: #fee2e2;
        opacity: 1;
      }

      .remove-button:focus-visible,
      .remove-domain-button:focus-visible {
        outline: 2px solid #ef4444;
        outline-offset: 1px;
      }

      .remove-button img,
      .remove-domain-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .context-badge {
        font-size: 10px;
        font-weight: 700;
        color: #1d4ed8;
        background: #dbeafe;
        border: 1px solid #93c5fd;
        border-radius: 999px;
        padding: 2px 6px;
        margin-left: 8px;
      }

      .refresh-domain-button {
        margin-left: auto;
        margin-right: 6px;
        width: 24px;
        height: 24px;
        padding: 4px;
        border: none;
        background: transparent;
        border-radius: 6px;
        cursor: pointer;
        line-height: 0;
        opacity: 0.9;
      }

      .refresh-domain-button:hover {
        background: #ccfbf1;
        opacity: 1;
      }

      .refresh-domain-button:focus-visible {
        outline: 2px solid #14b8a6;
        outline-offset: 1px;
      }

      .refresh-domain-button img {
        width: 16px;
        height: 16px;
        display: block;
      }

      .refresh-domain-button.is-loading img {
        animation: refresh-spin 0.9s linear infinite;
      }

      @keyframes refresh-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .flag-card {
        margin-top: 4px;
      }

      .flag-card + .flag-card {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #e5e7eb;
      }

      .flag-title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        row-gap: 4px;
      }

      .flag-title {
        margin-right: 0;
      }

      .flag-actions {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .flag-fields-list {
        margin-top: 4px;
        margin-bottom: 8px;
      }

      .field-row {
        display: grid;
        grid-template-columns: minmax(92px, max-content) 1fr;
        column-gap: 8px;
        align-items: start;
        margin-bottom: 2px;
      }

      .value-badge {
        display: inline-block;
        width: fit-content;
        max-width: 100%;
        font-size: 12px;
        font-weight: 600;
        color: #1f2937;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        padding: 1px 8px;
        line-height: 1.4;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flag info</h1>
      <ul id="fields"></ul>
      <div id="error"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
