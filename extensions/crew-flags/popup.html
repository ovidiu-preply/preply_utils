<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>crew-flags</title>
    <style>
      html,
      body {
        margin: 0;
        width: 420px;
        height: 520px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      main {
        box-sizing: border-box;
        padding: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      #title {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-word;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        margin: 0 0 10px;
      }

      .label {
        font-size: 12px;
        color: #555;
        margin-bottom: 2px;
      }

      .value {
        font-size: 14px;
        font-weight: 600;
        word-break: break-word;
      }

      .domain-title {
        margin-top: 10px;
        margin-bottom: 8px;
      }

      .domain-header-row {
        display: flex;
        align-items: center;
      }

      .track-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }

      .track-input {
        flex: 1;
        box-sizing: border-box;
        font-size: 13px;
        padding: 6px 8px;
      }

      .track-button {
        font-size: 13px;
        padding: 6px 10px;
        cursor: pointer;
      }

      .remove-button {
        margin-left: 8px;
        font-size: 12px;
        padding: 3px 8px;
        cursor: pointer;
      }

      .remove-domain-button {
        margin-left: 0;
        font-size: 12px;
        padding: 3px 8px;
        cursor: pointer;
      }

      .refresh-domain-button {
        margin-left: auto;
        margin-right: 8px;
        font-size: 12px;
        padding: 3px 8px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flag info</h1>
      <ul id="fields"></ul>
      <div id="error"></div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
